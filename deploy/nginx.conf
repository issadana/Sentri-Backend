# nginx reverse proxy for the Sentri backend.
# Install to /etc/nginx/sites-available/sentri, symlink into sites-enabled,
# then run certbot to add TLS (it will rewrite/extend this file automatically).
#
#   sudo ln -s /etc/nginx/sites-available/sentri /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.yourdomain.com

server {
    listen 80;
    server_name api.yourdomain.com;   # <-- change to your domain

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for the /firewall-logs/ws WebSocket endpoint.
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # WebSockets can stay open/idle; don't cut them off early.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
