<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Dashboard - Profile Workstation</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-canvas: #f8fafc;         
            --bg-surface: #ffffff;        
            --border-subtle: #e2e8f0;     
            --text-primary: #0f172a;      
            --text-secondary: #64748b;    
            --accent-blue: #2563eb;       
            --accent-danger: #dc2626;     
            --accent-success: #16a34a;    
            --navbar-bg: #ffffff;         
            --btn-toggle-bg: #f1f5f9;
            --chart-grid: rgba(0, 0, 0, 0.04);
        }

        body.dark-mode {
            --bg-canvas: #090d16;
            --bg-surface: #111827;
            --border-subtle: #1f293d;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-danger: #f43f5e;
            --accent-success: #16a34a;
            --navbar-bg: #111827;         
            --btn-toggle-bg: #1f2937;
            --chart-grid: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-canvas); color: var(--text-primary); 
            padding: 2rem; overflow: hidden;
            transition: background-color 0.2s, color 0.2s;
        }

        .app-container { display: flex; min-height: 100vh; width: 100vw; margin: -2rem; position: relative; }
        .main-content-window { flex: 1; padding: 2rem; background-color: var(--bg-canvas); overflow-y: auto; height: 100vh; transition: margin-right 0.3s ease; }

        /* Modified: Layout now consumes full width since chat is a drawer */
        .workspace-split-layout { display: grid; grid-template-columns: 1fr; gap: 1.5rem; margin-top: 1rem; }
        .analytics-charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        
        .panel-card { background-color: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 1.5rem; }
        .panel-title { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }

        /* High Fidelity Data Table Layout */
        .table-scroll-frame { overflow-x: auto; margin-top: 0.5rem; max-height: 430px; overflow-y: auto; border: 1px solid var(--border-subtle); border-radius: 8px; }
        .telemetry-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; }
        .telemetry-table th { background-color: var(--btn-toggle-bg); padding: 0.75rem 1rem; color: var(--text-secondary); font-weight: 600; position: sticky; top: 0; }
        .telemetry-table td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border-subtle); }
        
        .badge { font-weight: 700; font-size: 0.7rem; padding: 0.2rem 0.4rem; border-radius: 4px; text-transform: uppercase; }
        .badge-allow { background-color: rgba(22, 163, 74, 0.1); color: var(--accent-success); }
        .badge-block { background-color: rgba(220, 38, 38, 0.1); color: var(--accent-danger); }

        .btn-analyze { background-color: var(--accent-blue); color: white; border: none; padding: 0.35rem 0.7rem; border-radius: 6px; font-weight: 600; font-size: 0.75rem; cursor: pointer; transition: opacity 0.15s; }
        .btn-analyze:hover { opacity: 0.9; }

        /* --- UPDATED: FLOATING LAUNCHER BUTTON --- */
        .chat-launcher-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            /* Added transition to match the sidebar's sliding speed perfectly */
            transition: transform 0.2s, background-color 0.2s, right 0.3s ease;
        }
        .chat-launcher-btn:hover {
            transform: scale(1.05);
            background-color: var(--accent-blue-hover, #1d4ed8);
        }
        /* --- UPDATED: SLIDE OUT SIDEBAR OVERLAY DRAWER --- */
        .chatbot-sidebar-drawer {
            position: fixed;
            top: 0;
            right: -380px; /* Hidden off-screen initially */
            width: 380px;
            height: 100vh;
            background-color: var(--bg-surface);
            border-left: 1px solid var(--border-subtle);
            box-shadow: -10px 0 25px -5px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 999;
            transition: right 0.3s ease;
        }
        .chatbot-sidebar-drawer.open {
            right: 0; /* Slides into active view */
        }
        
        .chat-sidebar-header {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border-subtle);
            font-weight: 700;
            font-size: 0.9rem;
            background-color: var(--btn-toggle-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-sidebar-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.1rem;
            cursor: pointer;
        }

        /* ==========================================================================
   NOVA CHAT INTERFACE UTILITIES
   ========================================================================== */

/* Layout container for all chat message strings */
.chat-display { 
    flex: 1; 
    padding: 1rem; 
    overflow-y: auto; 
    display: flex; 
    flex-direction: column; 
    gap: 1rem; 
    background-color: var(--bg-canvas); 
}

/* Base structural properties for all text containers */
.msg-bubble { 
    max-width: 85%; 
    padding: 0.75rem 1rem; 
    border-radius: 12px; 
    font-size: 0.88rem; 
    line-height: 1.5; 
    word-break: break-word; /* Prevents long strings or IPs from breaking layout */
}

/* User identity message instance styling */
.msg-user { 
    background-color: var(--accent-blue); 
    color: white; 
    align-self: flex-end; 
    border-bottom-right-radius: 2px; 
}

/* Nova identity engine message instance styling */
.msg-bot { 
    background-color: var(--bg-surface); 
    color: var(--text-primary); 
    border: 1px solid var(--border-subtle); 
    align-self: flex-start; 
    border-bottom-left-radius: 2px; 
}

/* Nova brand identity label styling */
.nova-title {
    margin-bottom: 4px;
    font-size: 0.85rem;
    color: var(--text-primary);
}

/* ==========================================================================
   COMPACT DYNAMIC MARKDOWN RENDER FIXES
   ========================================================================== */

/* Regular text paragraphs parsed inside Nova's chat bubble */
.nova-content p {
    margin: 0 0 6px 0; /* Tightens paragraph spacing inside the bubble */
    line-height: 1.4;
    font-size: 0.9rem;
}

.nova-content p:last-child {
    margin-bottom: 0; /* Ensures no unnecessary whitespace at the bottom */
}

/* Structural lists (ul/ol) parsed inside tight sidebars */
.nova-content ul, .nova-content ol {
    margin: 0 0 6px 0;
    padding-left: 1.25rem; /* Indents bullets cleanly so they don't clip */
    font-size: 0.9rem;
}

.nova-content li {
    margin-bottom: 3px;
    line-height: 1.35;
}

/* Monospace text fields for network parameters, indicators or IPs */
.nova-content code {
    background-color: rgba(255, 255, 255, 0.1);
    padding: 2px 5px;
    border-radius: 3px;
    font-family: monospace;
    font-size: 0.85rem;
}

/* ==========================================================================
   INPUT INTERACTION BAR COMPONENT
   ========================================================================== */
.chat-input-bar { 
    padding: 0.75rem 1rem; 
    background-color: var(--bg-surface); 
    border-top: 1px solid var(--border-subtle); 
    display: flex; 
    gap: 8px; 
}

.chat-input { 
    flex: 1; 
    padding: 0.6rem 0.8rem; 
    border: 1px solid var(--border-subtle); 
    border-radius: 8px; 
    background-color: var(--bg-canvas); 
    color: var(--text-primary); 
    font-size: 0.88rem; 
}

.chat-send-btn { 
    background-color: var(--accent-blue); 
    color: white; 
    border: none; 
    padding: 0 1.2rem; 
    border-radius: 8px; 
    font-weight: 600; 
    cursor: pointer; 
}

/* Fullscreen Backdrop Overlay */
.analysis-modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.6); /* Dim background */
    backdrop-filter: blur(4px); /* Modern frosted look */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1050; /* Ensures it stays completely on top */
}

/* Central Card Box */
.analysis-modal-card {
    background-color: var(--bg-surface);
    border: 1px solid var(--border-subtle);
    width: 90%;
    max-width: 680px; /* Spacious structure for structural headings */
    max-height: 85vh;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: modalFadeIn 0.2s ease-out;
}

/* Header Component */
.analysis-modal-header {
    padding: 1rem 1.5rem;
    background-color: var(--bg-canvas);
    border-bottom: 1px solid var(--border-subtle);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.analysis-modal-header h3 {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text-primary);
}

.analysis-modal-close {
    background: none;
    border: none;
    color: var(--text-secondary);
    font-size: 1.5rem;
    cursor: pointer;
    line-height: 1;
    padding: 0;
}

.analysis-modal-close:hover {
    color: var(--accent-danger);
}

/* Scrollable Inner Body Text Container */
.analysis-modal-body {
    padding: 1.5rem;
    overflow-y: auto;
    color: var(--text-primary);
    background-color: var(--bg-surface);
}

/* Modal Content Markdown Elements adjustments */
.analysis-modal-body .nova-content h3 {
    font-size: 1.05rem;
    margin: 1.2rem 0 0.6rem 0;
    color: var(--text-primary);
    border-bottom: 1px solid var(--border-subtle);
    padding-bottom: 4px;
}

.analysis-modal-body .nova-content h3:first-child {
    margin-top: 0;
}

.analysis-modal-body .nova-content p, 
.analysis-modal-body .nova-content li {
    font-size: 0.92rem;
    line-height: 1.5;
    color: var(--text-secondary);
}

/* Centered Processing State CSS */
.analysis-loader-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 0;
    gap: 1rem;
    color: var(--text-secondary);
}

.analysis-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255, 255, 255, 0.1);
    border-top: 3px solid var(--accent-blue);
    border-radius: 50%;
    animation: modalSpin 0.8s linear infinite;
}

.analysis-error-block {
    background-color: rgba(239, 68, 68, 0.1);
    border: 1px solid var(--accent-danger);
    padding: 1rem;
    border-radius: 6px;
    color: var(--text-primary);
    font-size: 0.9rem;
}

/* Animations */
@keyframes modalFadeIn {
    from { transform: scale(0.95); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

@keyframes modalSpin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* ==========================================================================
           HARDWARE DIAGNOSTIC TELEMETRY COMPONENTS
           ========================================================================== */
        .hardware-summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }
        
        .hardware-card {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .hardware-card-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .hardware-card-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: system-ui, sans-serif;
        }

        .hardware-progress-track {
            width: 100%;
            height: 6px;
            background-color: var(--btn-toggle-bg);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 4px;
        }

        .hardware-progress-fill {
            height: 100%;
            background-color: var(--accent-blue);
            border-radius: 4px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Threshold Warning Overrides */
        .hardware-progress-fill.warning { background-color: #eab308; }
        .hardware-progress-fill.danger { background-color: var(--accent-danger); }
        .hardware-progress-fill.success { background-color: var(--accent-success); }

    </style>
</head>
<body>

    <div class="app-container">
        {% include 'sidebar_navigation.html' %}

        <div class="main-content-window" id="mainWorkspaceWindow">

            {% include 'navbar.html' %}

            <div style="margin-bottom: 1.5rem;">
                <h2 style="font-size: 1.5rem; font-weight: 700; text-transform: capitalize;">💻 Account Node: <span id="profileUserLabel">Loading...</span></h2>
            </div>

            <div class="workspace-split-layout">

                {% include 'user_page/user_chart_data.html' %}

                {% include 'user_page/user_analysis_table.html' %}

                {% include 'user_page/user_hardware_table.html' %}
                    
            </div>

        </div>


        {% include 'user_page/user_chatbot.html' %}


    </div>


<script>

        base_url = CONFIG.BASE_URL;

        const userId = "{{ profile_id }}";
        let profileUser = "Unknown";

        async function loadProfileHeader() {
            const response = await authFetch(`${base_url}/dashboard/api/logs/user/${userId}`);
            if (!response.ok) {
                return;
            }
            const resData = await response.json();
            if (resData.status === "success") {
                profileUser = resData.username || profileUser;
            }
            document.getElementById("profileUserLabel").textContent = profileUser;
            const chatLabel = document.getElementById("chatProfileUserLabel");
            if (chatLabel) {
                chatLabel.textContent = profileUser;
            }
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeText');
            body.classList.toggle('dark-mode');
            btn.textContent = body.classList.contains('dark-mode') ? 'LIGHT MODE' : 'DARK MODE';
            if (window.actionsChartInstance) window.actionsChartInstance.update();
            if (window.payloadChartInstance) window.payloadChartInstance.update();
        }


        document.addEventListener("DOMContentLoaded", async () => {
            await loadProfileHeader();
            fetchAndRenderProfileWorkstation();
        });


</script>
</body>
</html>
