<style>
            .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            background-color: var(--navbar-bg); padding: 1rem 1.75rem; 
            border-radius: 12px; border: 1px solid var(--border-subtle); margin-bottom: 2.5rem;
        }
        .brand-container { display: flex; align-items: center; gap: 10px; }
        .brand-badge { background-color: var(--accent-blue); color: #ffffff; font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.5rem; border-radius: 6px; }
        .brand-title { font-size: 1.2rem; font-weight: 600; }
        .navbar-actions { display: flex; align-items: center; gap: 20px; }

        .theme-toggle-btn {
            background-color: var(--btn-toggle-bg); border: none; color: var(--text-primary);
            padding: 0.5rem 0.9rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.75rem;
        }
        .logout-btn {
            color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; font-weight: 600;
            padding: 0.5rem 0.9rem; border-radius: 8px; border: 1px solid var(--border-subtle);
        }
        .logout-btn:hover { color: #ffffff; background-color: var(--accent-danger); border-color: var(--accent-danger); }

</style>

<div class="navbar">
    <div class="brand-container">
        <span class="brand-badge">NOVA</span>
        <span class="brand-title">Network Analytics Core</span>
    </div>
    <div class="navbar-actions">
        <div style="font-size: 0.9rem; color: var(--text-secondary);">Operator: <strong id="operatorLabel">—</strong></div>
        <button class="theme-toggle-btn" id="themeText" onclick="toggleTheme()">DARK MODE</button>
        <button type="button" class="logout-btn" onclick="logoutUser()">Logout</button>
    </div>
</div>
