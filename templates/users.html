<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Dashboard - User Profiles Inventory</title>
    <style>
        :root {
            --bg-canvas: #f8fafc;         
            --bg-surface: #ffffff;        
            --border-subtle: #e2e8f0;     
            --text-primary: #0f172a;      
            --text-secondary: #64748b;    
            --accent-blue: #2563eb;       
            --accent-blue-hover: #1d4ed8;
            --accent-danger: #dc2626;     
            --accent-warning: #ea580c;
            --accent-success: #16a34a;
            --navbar-bg: #ffffff;         
            --btn-toggle-bg: #f1f5f9;
        }

        /* Dark Mode Theme Variable Synchronization */
        body.dark-mode {
            --bg-canvas: #090d16;
            --bg-surface: #111827;
            --border-subtle: #1f293d;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-blue-hover: #0ea5e9;
            --accent-danger: #f43f5e;
            --navbar-bg: #111827;         
            --btn-toggle-bg: #1f2937;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-canvas); color: var(--text-primary); 
            padding: 2rem;
            overflow: hidden; /* Keeps parent frame layout fixed */
            transition: background-color 0.2s, color 0.2s;
        }

        /* --- NAVIGATION GRID WRAPPERS --- */
        .app-container {
            display: flex;
            min-height: 100vh;
            width: 100vw;
            margin: -2rem; 
        }

        /* The right content viewport is scrollable for handling massive lists of users */
        .main-content-window {
            flex: 1;
            padding: 2rem;
            background-color: var(--bg-canvas);
            overflow-y: auto; /* Adds seamless vertical scroll when cards overflow */
            height: 100vh;
        }



        /* --- RESPONSIVE AUTO-GRID FOR LIVE PROFILE CARDS --- */
        .user-cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            padding-bottom: 3rem; /* Extra space at the bottom to breathe while scrolling */
        }

        /* --- USER CARD ELEMENT DEFINITIONS --- */
        .profile-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .profile-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -5px rgba(0, 0, 0, 0.08);
            border-color: var(--accent-success);
        }

        /* Accent top stripe highlighting risk factor levels */
        .risk-indicator-bar {
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
        }
        .risk-CRITICAL { background-color: var(--accent-danger); }
        .risk-WARNING { background-color: var(--accent-warning); }
        .risk-SECURE { background-color: var(--accent-success); }

        /* Card Layout Header Block */
        .card-header-block {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.25rem;
        }

        .user-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            background-color: var(--btn-toggle-bg);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; border: 1px solid var(--border-subtle);
        }

        .user-identity-details {
            display: flex;
            flex-direction: column;
        }

        .user-ip-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* Status Pill Badge Components */
        .status-badge {
            display: inline-block;
            font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
            padding: 0.15rem 0.45rem; border-radius: 4px; width: fit-content; margin-top: 2px;
        }
        .badge-CRITICAL { background-color: rgba(244, 63, 94, 0.12); color: var(--accent-danger); }
        .badge-WARNING { background-color: rgba(234, 88, 12, 0.12); color: var(--accent-warning); }
        .badge-SECURE { background-color: rgba(22, 163, 74, 0.12); color: var(--accent-success); }

        /* Row-by-Row Metrics Panel Layout */
        .card-metrics-panel {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
        }

        .metric-data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.88rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px dashed var(--border-subtle);
        }
        .metric-data-row:last-child { border-bottom: none; }

        .metric-row-label { color: var(--text-secondary); font-weight: 500; }
        .metric-row-value { color: var(--text-primary); font-weight: 600; }

        /* Primary Call-to-Action Link Elements */
        .profile-inspect-btn {
            display: block; text-align: center; text-decoration: none;
            background-color: var(--btn-toggle-bg); color: var(--text-primary);
            border: 1px solid var(--border-subtle); padding: 0.6rem;
            border-radius: 8px; font-size: 0.85rem; font-weight: 600;
            transition: all 0.15s ease; margin-top: auto;
        }

        .profile-inspect-btn:hover {
            background-color: var(--accent-success);
            border-color: var(--btn-toggle-bg);
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        {% include 'sidebar_navigation.html' %}

        <div class="main-content-window">

            {% include 'navbar.html' %}

            <div class="user-cards-grid" id="usersProfilesContainer">

            </div>

        </div>
    </div>

<script>

    base_url = CONFIG.BASE_URL;


    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeText');
        body.classList.toggle('dark-mode');
        btn.textContent = body.classList.contains('dark-mode') ? 'LIGHT MODE' : 'DARK MODE';
    }

    async function loadLiveUserProfiles() {
        const container = document.getElementById('usersProfilesContainer');
        
        container.innerHTML = `
            <div style="text-align: center; grid-column: 1 / -1; padding: 4rem; color: var(--text-secondary); font-weight: 500;">
                🔄 Retrieving registered application user accounts...
            </div>
        `;

        try {
            const response = await authFetch(`${base_url}/dashboard/api/users-list`);
            const result = await response.json();

            if (!response.ok || result.status !== "success") {
                throw new Error(result.message || "Unknown backend service exception.");
            }

            const liveProfiles = result.data;

            if (liveProfiles.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; grid-column: 1 / -1; padding: 4rem; color: var(--text-secondary);">
                        ℹ️ No user profiles found in the registry.
                    </div>
                `;
                return;
            }

            let htmlBuffer = '';
            
            liveProfiles.forEach(user => {
                htmlBuffer += `
                    <div class="profile-card">
                        <div class="risk-indicator-bar risk-${user.risk}"></div>
                        
                        <div class="card-header-block">
                            <div class="user-avatar">👤</div>
                            <div class="user-identity-details">
                                <span class="user-ip-title" style="text-transform: capitalize;">${user.username}</span>
                                <span class="status-badge badge-${user.risk}">${user.role}</span>
                            </div>
                        </div>

                        <div class="card-metrics-panel">
                            <div class="metric-data-row">
                                <span class="metric-row-label">Account Privilege</span>
                                <span class="metric-row-value" style="text-transform: uppercase; font-size:0.8rem;">
                                    ${user.role}
                                </span>
                            </div>
                            <div class="metric-data-row">
                                <span class="metric-row-label">Account Index Ref</span>
                                <span class="metric-row-value">#000${user.id}</span>
                            </div>
                        </div>

                        <a href="/user-profile/${user.id}" class="profile-inspect-btn">
                            Manage Account &rarr;
                        </a>
                    </div>
                `;
            });

            container.innerHTML = htmlBuffer;

        } catch (err) {
            container.innerHTML = `
                <div style="text-align: center; grid-column: 1 / -1; padding: 3rem; border: 1px dashed var(--accent-danger); border-radius: 12px; color: var(--accent-danger); background-color: rgba(220, 38, 38, 0.02);">
                    ⚠️ <strong>Failed to load users profile framework:</strong> ${err.message}
                </div>
            `;
        }
    }

    document.addEventListener("DOMContentLoaded", loadLiveUserProfiles);

    
    </script>
</body>
</html>
